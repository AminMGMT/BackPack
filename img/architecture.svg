<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 312" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e8552d"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="998" height="310" rx="14" fill="#ffffff" stroke="#d0d7de"/>
  <text x="500" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2328">How Backpack moves traffic</text>

  <!-- End users -->
  <rect x="20" y="137" width="120" height="70" rx="10" fill="#eef1f4" stroke="#d0d7de"/>
  <text x="80" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">End users</text>
  <text x="80" y="186" text-anchor="middle" font-size="11" fill="#6b7280">in Iran</text>

  <!-- Iran server -->
  <rect x="172" y="78" width="248" height="150" rx="12" fill="#ffffff" stroke="#e8552d" stroke-width="1.5"/>
  <text x="296" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#e8552d">IRAN SERVER</text>
  <text x="296" y="118" text-anchor="middle" font-size="10.5" fill="#6b7280">role: SERVER · exposes ports</text>
  <rect x="190" y="132" width="212" height="82" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="296" y="158" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">Forwarded ports · :443 :8443</text>
  <text x="296" y="180" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">Backpack engine</text>
  <text x="296" y="199" text-anchor="middle" font-size="10.5" fill="#6b7280">token auth · pool · monitor</text>

  <!-- Kharej server -->
  <rect x="580" y="78" width="248" height="150" rx="12" fill="#ffffff" stroke="#8a94a6" stroke-width="1.5"/>
  <text x="704" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2328">KHAREJ / ABROAD</text>
  <text x="704" y="118" text-anchor="middle" font-size="10.5" fill="#6b7280">role: CLIENT · dials out</text>
  <rect x="598" y="132" width="212" height="82" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="704" y="166" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">Backpack engine</text>
  <text x="704" y="190" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2328">forward to the real service</text>

  <!-- Real service -->
  <rect x="860" y="137" width="120" height="70" rx="10" fill="#eef1f4" stroke="#d0d7de"/>
  <text x="920" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">Real service</text>
  <text x="920" y="186" text-anchor="middle" font-size="10.5" fill="#6b7280">VPN · proxy · internet</text>

  <!-- flow -->
  <path d="M140 172 H170" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="500" y="156" text-anchor="middle" font-size="11.5" font-weight="600" fill="#e8552d">encrypted tunnel · one transport</text>
  <path d="M424 172 H576" stroke="#e8552d" stroke-width="2.5" fill="none" marker-start="url(#arrA)" marker-end="url(#arrA)"/>
  <path d="M576 196 H424" stroke="#8a94a6" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arr)"/>
  <text x="500" y="214" text-anchor="middle" font-size="10.5" fill="#6b7280">the client dials the server (kharej → Iran)</text>
  <path d="M828 172 H858" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <text x="500" y="290" text-anchor="middle" font-size="11" fill="#6b7280">Transports: TCP · TCP Mux · TCP + Stealth · UDP · UDP + KCP · WS · WS Mux · WSS · WSS Mux</text>
</svg>
