name: Release

# Publishes the assets for a tag. A tag containing a suffix (v1.6.0-beta.1) is
# published as a pre-release, which is what the Beta release channel installs.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test before publishing
        # Nothing gets published that has not passed the suite. A broken
        # release is far more expensive to undo than a slow pipeline.
        run: go test ./... -timeout 20m

      - name: Build release assets
        run: make release

      - name: Verify the tag matches the built version
        run: |
          tag="${GITHUB_REF_NAME}"
          declared="$(tr -d ' \n' < VERSION)"
          # A pre-release tag (v1.6.0-beta.1) carries the version it is a
          # pre-release of, so compare only the part before the suffix.
          base="${tag%%-*}"
          if [ "$base" != "$declared" ]; then
            echo "Tag $tag does not match VERSION ($declared)."
            exit 1
          fi

      - name: Mark pre-releases
        id: kind
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Release notes from CHANGELOG
        # The release description is this tag's section of CHANGELOG.md — from
        # its "## <tag>" heading up to the next version heading.
        run: |
          tag="${GITHUB_REF_NAME}"
          awk -v h="## ${tag}" '
            index($0, h) == 1 { f = 1; next }
            f && /^## v/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Backpack ${tag}" > RELEASE_NOTES.md
          fi

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.kind.outputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: |
            release/backpack_linux_amd64.tar.gz
            release/backpack_linux_arm64.tar.gz
            release/SHA256SUMS
            install.sh
